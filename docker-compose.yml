services:
  web:
    build: .
    container_name: compendium-web
    restart: unless-stopped
    volumes:
      - quest-data:/app/quests.json   # persists only the cache file, not the whole app
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - backend                        # web is ONLY on backend — never exposed directly

  nginx:
    image: nginx:alpine
    container_name: compendium-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot-webroot:/var/www/certbot
      - certs:/etc/letsencrypt
    depends_on:
      - web
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    networks:
      - frontend                       # nginx faces the internet on frontend
      - backend                        # AND sits on backend so it can reach web:3000

  certbot:
    image: certbot/certbot:latest
    container_name: compendium-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certs:/etc/letsencrypt
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  certbot-webroot:
  certs:
  quest-data:

networks:
  frontend:
  backend:
